name: Build Game Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="BlackPhone3D" --collect-all ursina --collect-all panda3d black_phone_3d.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BlackPhone3D-Windows
        path: dist/BlackPhone3D.exe

    - name: Create or Update Release
      uses: ncipollo/release-action@v1
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        artifacts: "dist/BlackPhone3D.exe"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        tag: "latest"
        name: "Latest Build"
        body: "Автоматическая сборка игры из ветки main."

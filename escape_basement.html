<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Побег из Подвала - Stealth Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: #000;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 4px #000;
            z-index: 100;
        }
        #ui div {
            margin: 5px 0;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
        }
        #inventory {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            max-width: 300px;
            z-index: 100;
        }
        #inventory h3 {
            margin-bottom: 5px;
            color: #ff6b6b;
        }
        .item-slot {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 2px solid #555;
            margin: 3px;
            background: rgba(50,50,50,0.8);
            border-radius: 5px;
            text-align: center;
            line-height: 46px;
            font-size: 24px;
        }
        .item-slot.collected {
            border-color: #4ecdc4;
            background: rgba(78,205,196,0.3);
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 10px;
            border: 3px solid #ff6b6b;
            display: none;
            z-index: 200;
        }
        #minimap {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #555;
            border-radius: 5px;
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
        #stealth-meter {
            position: absolute;
            top: 170px;
            right: 10px;
            width: 150px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #555;
            border-radius: 5px;
            padding: 5px;
            z-index: 100;
        }
        #stealth-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        #stealth-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #feca57, #ff6b6b);
            transition: width 0.3s;
        }
        #stealth-text {
            color: #fff;
            font-size: 12px;
            text-align: center;
            margin-top: 3px;
        }
        .btn {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .btn:hover {
            background: #ee5a5a;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>❤️ Жизни: <span id="lives">10</span></div>
        <div>📦 Предметы: <span id="items-collected">0</span>/8</div>
        <div>⏱️ Время: <span id="time">0:00</span></div>
        <div>👁️ Статус: <span id="status">Безопасно</span></div>
    </div>
    
    <div id="minimap">
        <canvas id="minimapCanvas" width="150" height="150"></canvas>
    </div>
    
    <div id="stealth-meter">
        <div id="stealth-bar">
            <div id="stealth-fill"></div>
        </div>
        <div id="stealth-text">Уровень заметности</div>
    </div>
    
    <div id="inventory">
        <h3>🎒 Инвентарь</h3>
        <div id="items-container"></div>
    </div>
    
    <div id="controls">
        WASD/Стрелки - Движение<br>
        SHIFT - Бег<br>
        C - Присесть<br>
        E - Взять предмет<br>
        M - Миникарта
    </div>
    
    <div id="message">
        <h2 id="msg-title"></h2>
        <p id="msg-text"></p>
        <button class="btn" onclick="restartGame()">Играть снова</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Игровые константы
        const ROOM_WIDTH = 800;
        const ROOM_HEIGHT = 600;
        const PLAYER_SIZE = 20;
        const ENEMY_SIZE = 25;
        const ITEM_SIZE = 15;
        
        // Состояние игры
        let gameState = {
            lives: 10,
            itemsCollected: 0,
            totalItems: 8,
            gameTime: 0,
            isRunning: true,
            stealthLevel: 0,
            lastEnemyCheck: 0
        };
        
        // Игрок
        let player = {
            x: ROOM_WIDTH / 2,
            y: ROOM_HEIGHT / 2,
            vx: 0,
            vy: 0,
            speed: 3,
            runSpeed: 5,
            isRunning: false,
            isCrouching: false,
            angle: 0,
            viewDistance: 150,
            viewAngle: Math.PI / 3
        };
        
        // Похититель (ИИ)
        let enemy = {
            x: 100,
            y: 100,
            vx: 0,
            vy: 0,
            speed: 2,
            patrolPoints: [
                {x: 100, y: 100},
                {x: 700, y: 100},
                {x: 700, y: 500},
                {x: 100, y: 500}
            ],
            currentPoint: 0,
            state: 'patrol', // patrol, chase, search, return
            targetX: null,
            targetY: null,
            awareness: 0,
            lastSeenPlayer: null,
            searchTime: 0
        };
        
        // Предметы
        const items = [
            {x: 150, y: 150, collected: false, name: 'Ржавый ключ', icon: '🔑'},
            {x: 650, y: 150, collected: false, name: 'Обломок трубы', icon: '🔧'},
            {x: 650, y: 450, collected: false, name: 'Старая газета', icon: '📰'},
            {x: 150, y: 450, collected: false, name: 'Батарейка', icon: '🔋'},
            {x: 400, y: 80, collected: false, name: 'Верёвка', icon: '🪢'},
            {x: 400, y: 520, collected: false, name: 'Ножницы', icon: '✂️'},
            {x: 80, y: 300, collected: false, name: 'Фонарик', icon: '🔦'},
            {x: 720, y: 300, collected: false, name: 'Монета', icon: '🪙'}
        ];
        
        // Укрытия (тёмные зоны)
        const hidingSpots = [
            {x: 120, y: 120, width: 100, height: 100},
            {x: 580, y: 120, width: 100, height: 100},
            {x: 580, y: 380, width: 100, height: 100},
            {x: 120, y: 380, width: 100, height: 100},
            {x: 350, y: 50, width: 100, height: 80},
            {x: 350, y: 470, width: 100, height: 80}
        ];
        
        // Управление
        const keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'e' || e.key === 'E' || e.key === 'у' || e.key === 'У') {
                tryCollectItem();
            }
            if (e.key === 'm' || e.key === 'M' || e.key === 'ь' || e.key === 'Ь') {
                // Toggle minimap if needed
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        // Проверка сбора предмета
        function tryCollectItem() {
            items.forEach(item => {
                if (!item.collected) {
                    const dx = player.x - item.x;
                    const dy = player.y - item.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 40) {
                        item.collected = true;
                        gameState.itemsCollected++;
                        updateInventory();
                        checkWin();
                    }
                }
            });
        }
        
        // Обновление инвентаря
        function updateInventory() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'item-slot' + (item.collected ? ' collected' : '');
                slot.textContent = item.collected ? item.icon : '?';
                slot.title = item.collected ? item.name : 'Не найдено';
                container.appendChild(slot);
            });
            document.getElementById('items-collected').textContent = gameState.itemsCollected;
        }
        
        // Проверка победы
        function checkWin() {
            if (gameState.itemsCollected >= gameState.totalItems) {
                endGame(true);
            }
        }
        
        // Конец игры
        function endGame(win) {
            gameState.isRunning = false;
            const msg = document.getElementById('message');
            const title = document.getElementById('msg-title');
            const text = document.getElementById('msg-text');
            
            if (win) {
                title.textContent = '🎉 ПОБЕДА!';
                title.style.color = '#4ecdc4';
                text.textContent = `Вы собрали все предметы и сбежали из подвала!\nВремя: ${formatTime(gameState.gameTime)}\nОсталось жизней: ${gameState.lives}`;
            } else {
                title.textContent = '💀 ПОРАЖЕНИЕ';
                title.style.color = '#ff6b6b';
                text.textContent = 'Похититель поймал вас...\nПопробуйте снова!';
            }
            
            msg.style.display = 'block';
        }
        
        // Перезапуск игры
        function restartGame() {
            gameState = {
                lives: 10,
                itemsCollected: 0,
                totalItems: 8,
                gameTime: 0,
                isRunning: true,
                stealthLevel: 0,
                lastEnemyCheck: 0
            };
            
            player.x = ROOM_WIDTH / 2;
            player.y = ROOM_HEIGHT / 2;
            player.vx = 0;
            player.vy = 0;
            
            enemy.x = 100;
            enemy.y = 100;
            enemy.currentPoint = 0;
            enemy.state = 'patrol';
            enemy.awareness = 0;
            enemy.lastSeenPlayer = null;
            
            items.forEach(item => item.collected = false);
            
            document.getElementById('message').style.display = 'none';
            updateInventory();
            updateUI();
            
            lastTime = performance.now();
            gameLoop(lastTime);
        }
        
        // Форматирование времени
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Проверка укрытия
        function isInHidingSpot(x, y) {
            return hidingSpots.some(spot => 
                x > spot.x && x < spot.x + spot.width &&
                y > spot.y && y < spot.y + spot.height
            );
        }
        
        // Проверка видимости игрока
        function canEnemySeePlayer() {
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            // Если игрок в укрытии, его не видно
            if (isInHidingSpot(player.x, player.y) && !player.isRunning) {
                return false;
            }
            
            // Дальность видимости
            if (dist > 200) return false;
            
            // Угол обзора врага
            const angleToPlayer = Math.atan2(dy, dx);
            let angleDiff = Math.abs(angleToPlayer - enemy.angle);
            while (angleDiff > Math.PI) angleDiff -= 2*Math.PI;
            angleDiff = Math.abs(angleDiff);
            
            if (angleDiff > Math.PI / 2) return false;
            
            // Присевший игрок менее заметен
            if (player.isCrouching) {
                return dist < 100;
            }
            
            return true;
        }
        
        // ИИ врага
        function updateEnemy(deltaTime) {
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const distToPlayer = Math.sqrt(dx*dx + dy*dy);
            
            // Обновление угла врага
            if (enemy.state === 'chase' || enemy.state === 'search') {
                enemy.angle = Math.atan2(dy, dx);
            } else if (enemy.state === 'patrol') {
                const target = enemy.patrolPoints[enemy.currentPoint];
                const pdx = target.x - enemy.x;
                const pdy = target.y - enemy.y;
                enemy.angle = Math.atan2(pdy, pdx);
            }
            
            // Логика состояний
            switch (enemy.state) {
                case 'patrol':
                    const target = enemy.patrolPoints[enemy.currentPoint];
                    const pdx = target.x - enemy.x;
                    const pdy = target.y - enemy.y;
                    const pDist = Math.sqrt(pdx*pdx + pdy*pdy);
                    
                    if (pDist < 10) {
                        enemy.currentPoint = (enemy.currentPoint + 1) % enemy.patrolPoints.length;
                    } else {
                        enemy.x += (pdx / pDist) * enemy.speed;
                        enemy.y += (pdy / pDist) * enemy.speed;
                    }
                    
                    // Если увидел игрока
                    if (canEnemySeePlayer()) {
                        enemy.state = 'chase';
                        enemy.lastSeenPlayer = {x: player.x, y: player.y};
                    }
                    break;
                    
                case 'chase':
                    enemy.x += (dx / distToPlayer) * (enemy.speed * 1.5);
                    enemy.y += (dy / distToPlayer) * (enemy.speed * 1.5);
                    
                    // Если потерял игрока
                    if (!canEnemySeePlayer()) {
                        enemy.state = 'search';
                        enemy.searchTime = 0;
                    }
                    
                    // Если поймал игрока
                    if (distToPlayer < 30) {
                        catchPlayer();
                    }
                    break;
                    
                case 'search':
                    enemy.searchTime += deltaTime;
                    
                    // Поиск в последней известной позиции
                    if (enemy.lastSeenPlayer) {
                        const sdx = enemy.lastSeenPlayer.x - enemy.x;
                        const sdy = enemy.lastSeenPlayer.y - enemy.y;
                        const sDist = Math.sqrt(sdx*sdx + sdy*sdy);
                        
                        if (sDist > 10) {
                            enemy.x += (sdx / sDist) * enemy.speed;
                            enemy.y += (sdy / sDist) * enemy.speed;
                        } else if (enemy.searchTime > 3000) {
                            enemy.state = 'patrol';
                        }
                    } else {
                        enemy.state = 'patrol';
                    }
                    
                    // Если снова увидел игрока
                    if (canEnemySeePlayer()) {
                        enemy.state = 'chase';
                    }
                    break;
            }
            
            // Границы комнаты
            enemy.x = Math.max(ENEMY_SIZE, Math.min(ROOM_WIDTH - ENEMY_SIZE, enemy.x));
            enemy.y = Math.max(ENEMY_SIZE, Math.min(ROOM_HEIGHT - ENEMY_SIZE, enemy.y));
        }
        
        // Поймать игрока
        function catchPlayer() {
            gameState.lives--;
            updateUI();
            
            // Отбросить игрока
            const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            player.x = enemy.x - Math.cos(angle) * 100;
            player.y = enemy.y - Math.sin(angle) * 100;
            
            // Сбросить позицию врага
            enemy.state = 'patrol';
            enemy.awareness = 0;
            
            if (gameState.lives <= 0) {
                endGame(false);
            }
        }
        
        // Обновление игрока
        function updatePlayer() {
            player.isRunning = keys['shift'] && !player.isCrouching;
            player.isCrouching = keys['c'] || keys['с'];
            
            const speed = player.isRunning ? player.runSpeed : player.speed;
            const moveSpeed = player.isCrouching ? speed * 0.5 : speed;
            
            player.vx = 0;
            player.vy = 0;
            
            if (keys['w'] || keys['ц'] || keys['arrowup']) player.vy = -moveSpeed;
            if (keys['s'] || keys['ы'] || keys['arrowdown']) player.vy = moveSpeed;
            if (keys['a'] || keys['ф'] || keys['arrowleft']) player.vx = -moveSpeed;
            if (keys['d'] || keys['в'] || keys['arrowright']) player.vx = moveSpeed;
            
            player.x += player.vx;
            player.y += player.vy;
            
            // Границы комнаты
            player.x = Math.max(PLAYER_SIZE, Math.min(ROOM_WIDTH - PLAYER_SIZE, player.x));
            player.y = Math.max(PLAYER_SIZE, Math.min(ROOM_HEIGHT - PLAYER_SIZE, player.y));
            
            // Угол взгляда игрока
            if (player.vx !== 0 || player.vy !== 0) {
                player.angle = Math.atan2(player.vy, player.vx);
            }
        }
        
        // Обновление уровня заметности
        function updateStealthLevel() {
            const inHiding = isInHidingSpot(player.x, player.y);
            const isMoving = player.vx !== 0 || player.vy !== 0;
            const isRunning = player.isRunning;
            const isCrouching = player.isCrouching;
            
            let change = 0;
            
            if (inHiding && !isMoving) {
                change = -2; // Быстро скрываемся
            } else if (inHiding && isCrouching) {
                change = -1; // Медленно скрываемся
            } else if (isCrouching) {
                change = -0.5; // Присев, медленнее становимся заметными
            } else if (isRunning) {
                change = 3; // Бег сильно привлекает внимание
            } else if (isMoving) {
                change = 1; // Движение привлекает внимание
            }
            
            // Если враг видит игрока
            if (canEnemySeePlayer()) {
                change += 5;
                document.getElementById('status').textContent = '🚨 ВАС ВИДЯТ!';
                document.getElementById('status').style.color = '#ff6b6b';
            } else {
                document.getElementById('status').textContent = inHiding ? '🟢 В укрытии' : '🟡 На виду';
                document.getElementById('status').style.color = inHiding ? '#4ecdc4' : '#feca57';
            }
            
            gameState.stealthLevel = Math.max(0, Math.min(100, gameState.stealthLevel + change));
            
            // Обновление полоски
            document.getElementById('stealth-fill').style.width = gameState.stealthLevel + '%';
        }
        
        // Обновление UI
        function updateUI() {
            document.getElementById('lives').textContent = gameState.lives;
            document.getElementById('time').textContent = formatTime(gameState.gameTime);
        }
        
        // Отрисовка комнаты
        function drawRoom() {
            // Пол
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(0, 0, ROOM_WIDTH, ROOM_HEIGHT);
            
            // Стены
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 20;
            ctx.strokeRect(0, 0, ROOM_WIDTH, ROOM_HEIGHT);
            
            // Укрытия (тёмные зоны)
            hidingSpots.forEach(spot => {
                const gradient = ctx.createRadialGradient(
                    spot.x + spot.width/2, spot.y + spot.height/2, 0,
                    spot.x + spot.width/2, spot.y + spot.height/2, spot.width/2
                );
                gradient.addColorStop(0, 'rgba(0,0,0,0.6)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(spot.x, spot.y, spot.width, spot.height);
            });
        }
        
        // Отрисовка предметов
        function drawItems() {
            items.forEach(item => {
                if (!item.collected) {
                    // Светящийся эффект
                    const gradient = ctx.createRadialGradient(item.x, item.y, 0, item.x, item.y, 30);
                    gradient.addColorStop(0, 'rgba(255,255,255,0.8)');
                    gradient.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, 30, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Иконка предмета
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.icon, item.x, item.y);
                }
            });
        }
        
        // Отрисовка игрока
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // Тело
            ctx.fillStyle = player.isCrouching ? '#4ecdc4' : '#3498db';
            ctx.beginPath();
            ctx.arc(0, 0, PLAYER_SIZE, 0, Math.PI * 2);
            ctx.fill();
            
            // Направление взгляда
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(PLAYER_SIZE * 0.6, 0, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // Конус зрения игрока
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = 'rgba(52, 152, 219, 0.2)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, player.viewDistance, -player.viewAngle/2, player.viewAngle/2);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
        
        // Отрисовка врага
        function drawEnemy() {
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            ctx.rotate(enemy.angle);
            
            // Тело
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(0, 0, ENEMY_SIZE, 0, Math.PI * 2);
            ctx.fill();
            
            // Злые глаза
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(8, -6, 5, 0, Math.PI * 2);
            ctx.arc(8, 6, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(10, -6, 2, 0, Math.PI * 2);
            ctx.arc(10, 6, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // Конус зрения врага
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            ctx.rotate(enemy.angle);
            
            let visionColor, visionDistance;
            if (enemy.state === 'chase') {
                visionColor = 'rgba(231, 76, 60, 0.4)';
                visionDistance = 200;
            } else if (enemy.state === 'search') {
                visionColor = 'rgba(241, 196, 15, 0.3)';
                visionDistance = 150;
            } else {
                visionColor = 'rgba(231, 76, 60, 0.2)';
                visionDistance = 120;
            }
            
            ctx.fillStyle = visionColor;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, visionDistance, -Math.PI/2, Math.PI/2);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }
        
        // Отрисовка миникарты
        function drawMinimap() {
            minimapCtx.clearRect(0, 0, 150, 150);
            
            const scale = 150 / Math.max(ROOM_WIDTH, ROOM_HEIGHT);
            const offsetX = (150 - ROOM_WIDTH * scale) / 2;
            const offsetY = (150 - ROOM_HEIGHT * scale) / 2;
            
            // Комната
            minimapCtx.fillStyle = '#333';
            minimapCtx.fillRect(offsetX, offsetY, ROOM_WIDTH * scale, ROOM_HEIGHT * scale);
            
            // Игрок
            minimapCtx.fillStyle = '#3498db';
            minimapCtx.beginPath();
            minimapCtx.arc(offsetX + player.x * scale, offsetY + player.y * scale, 4, 0, Math.PI * 2);
            minimapCtx.fill();
            
            // Враг
            minimapCtx.fillStyle = '#e74c3c';
            minimapCtx.beginPath();
            minimapCtx.arc(offsetX + enemy.x * scale, offsetY + enemy.y * scale, 5, 0, Math.PI * 2);
            minimapCtx.fill();
            
            // Предметы
            items.forEach(item => {
                if (!item.collected) {
                    minimapCtx.fillStyle = '#f1c40f';
                    minimapCtx.beginPath();
                    minimapCtx.arc(offsetX + item.x * scale, offsetY + item.y * scale, 2, 0, Math.PI * 2);
                    minimapCtx.fill();
                }
            });
            
            // Укрытия
            minimapCtx.fillStyle = 'rgba(0, 100, 0, 0.5)';
            hidingSpots.forEach(spot => {
                minimapCtx.fillRect(
                    offsetX + spot.x * scale,
                    offsetY + spot.y * scale,
                    spot.width * scale,
                    spot.height * scale
                );
            });
        }
        
        // Основной игровой цикл
        let lastTime = performance.now();
        
        function gameLoop(currentTime) {
            if (!gameState.isRunning) return;
            
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            // Обновление времени
            gameState.gameTime += deltaTime / 1000;
            
            // Очистка
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Центрирование камеры на игроке
            ctx.save();
            const camX = canvas.width / 2 - player.x;
            const camY = canvas.height / 2 - player.y;
            ctx.translate(camX, camY);
            
            // Отрисовка игрового мира
            drawRoom();
            drawItems();
            drawEnemy();
            drawPlayer();
            
            ctx.restore();
            
            // Обновление логики
            updatePlayer();
            updateEnemy(deltaTime);
            updateStealthLevel();
            updateUI();
            drawMinimap();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Инициализация
        updateInventory();
        gameLoop(performance.now());
        
        // Ресайз окна
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
